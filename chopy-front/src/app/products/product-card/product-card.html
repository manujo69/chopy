<article class="card">
  <p class="category">{{ product().category }}</p>
  <img [src]="product().thumbnail" [alt]="product().title" loading="lazy" />
  <h2>{{ product().title }}</h2>
  <p class="price">{{ product().price | number: '1.2-2' }} €</p>
  <button type="button" class="add-button" (click)="addToCart()" aria-label="Añadir al carrito">
    <svg lucidePlus></svg>
  </button>
</article>
